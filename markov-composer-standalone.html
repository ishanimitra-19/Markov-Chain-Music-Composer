<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markov Chain Music Composer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8f7f4; --surface: #ffffff; --surface2: #f1efe8;
      --border: rgba(0,0,0,0.12); --border-mid: rgba(0,0,0,0.22);
      --text: #1a1a18; --text-muted: #6b6a64;
      --accent: #185fa5; --accent-bg: #e6f1fb; --accent-text: #0c447c;
      --danger: #a32d2d; --danger-bg: #fcebeb; --danger-text: #791f1f;
      --radius: 8px; --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18; --surface: #242422; --surface2: #2c2c2a;
        --border: rgba(255,255,255,0.1); --border-mid: rgba(255,255,255,0.2);
        --text: #f1efe8; --text-muted: #888780;
        --accent: #378add; --accent-bg: #042c53; --accent-text: #b5d4f4;
        --danger: #e24b4a; --danger-bg: #501313; --danger-text: #f7c1c1;
      }
    }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; padding: 0 0 4rem; }
    header { padding: 2rem 2rem 1.25rem; border-bottom: 0.5px solid var(--border); margin-bottom: 1.5rem; }
    header h1 { font-size: 22px; font-weight: 500; letter-spacing: -0.3px; }
    .subtitle { font-size: 14px; color: var(--text-muted); margin-top: 2px; }
    main { max-width: 760px; margin: 0 auto; padding: 0 1.5rem; }
    .section { margin-bottom: 1.5rem; }
    label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 5px; font-weight: 500; }
    .hint { font-size: 12px; color: var(--text-muted); font-weight: 400; }
    textarea { width: 100%; font-family: 'Courier New', monospace; font-size: 12px; resize: vertical; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 12px; background: var(--surface); color: var(--text); line-height: 1.6; }
    textarea:focus { outline: none; border-color: var(--accent); }
    .valid-notes { margin-top: 5px; font-size: 12px; color: var(--text-muted); }
    #validNoteList { font-family: 'Courier New', monospace; }
    .controls-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
    .ctrl { display: flex; flex-direction: column; gap: 4px; }
    .ctrl-row { display: flex; align-items: center; gap: 8px; }
    .ctrl-row input[type="range"] { flex: 1; accent-color: var(--accent); }
    .val { font-size: 13px; font-weight: 500; min-width: 28px; text-align: right; }
    select { padding: 6px 10px; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); font-size: 13px; cursor: pointer; width: 100%; }
    select:focus { outline: none; border-color: var(--accent); }
    .btn-row { display: flex; gap: 8px; margin-bottom: 0.75rem; flex-wrap: wrap; }
    button { cursor: pointer; border: 0.5px solid var(--border-mid); border-radius: var(--radius); background: transparent; color: var(--text); font-size: 13px; padding: 7px 16px; font-family: inherit; transition: background 0.1s, transform 0.08s; }
    button:hover:not(:disabled) { background: var(--surface2); }
    button:active:not(:disabled) { transform: scale(0.98); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--surface); font-weight: 500; }
    .btn-play { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); font-weight: 500; }
    .btn-play:hover:not(:disabled) { filter: brightness(0.94); background: var(--accent-bg); }
    .btn-stop { background: var(--danger-bg); color: var(--danger-text); border-color: var(--danger); }
    .btn-stop:hover:not(:disabled) { filter: brightness(0.94); background: var(--danger-bg); }
    .status { font-size: 12px; color: var(--text-muted); min-height: 20px; margin-bottom: 0.75rem; }
    .output-area { background: var(--surface2); border-radius: var(--radius-lg); padding: 1rem 1.25rem; min-height: 60px; }
    .note-seq { display: flex; flex-wrap: wrap; gap: 5px; min-height: 30px; align-items: center; }
    .note-pill { padding: 3px 10px; border-radius: 100px; font-size: 12px; font-weight: 500; background: var(--surface); border: 0.5px solid var(--border); color: var(--text-muted); transition: background 0.1s, color 0.1s, border-color 0.1s; }
    .note-pill.active { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); }
    .placeholder { font-size: 13px; color: var(--text-muted); }
    .matrix-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
    .matrix-header label { margin: 0; }
    .metrics { display: flex; gap: 10px; }
    .metric { background: var(--surface2); border-radius: var(--radius); padding: 8px 14px; text-align: center; min-width: 72px; }
    .metric-val { font-size: 20px; font-weight: 500; }
    .metric-lbl { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    #matrixWrap { overflow-x: auto; }
    #matrixWrap table { border-collapse: collapse; font-size: 12px; width: 100%; min-width: 400px; }
    #matrixWrap th { color: var(--text-muted); font-weight: 500; padding: 4px 8px; text-align: center; border-bottom: 0.5px solid var(--border); white-space: nowrap; }
    #matrixWrap td { padding: 4px 8px; text-align: center; border-bottom: 0.5px solid var(--border); white-space: nowrap; }
    #matrixWrap td.row-label { color: var(--text-muted); font-weight: 500; text-align: right; font-family: 'Courier New', monospace; font-size: 11px; }
    .cell-bar { display: inline-block; height: 10px; background: var(--accent); opacity: 0.4; border-radius: 2px; vertical-align: middle; margin-left: 3px; }
  </style>
</head>
<body>

  <header>
    <h1>Markov Chain Composer</h1>
    <p class="subtitle">Learn a melody, generate something new</p>
  </header>

  <main>

    <section class="section">
      <label for="inputMelody">Input melody <span class="hint">(note names space-separated, use R for rest)</span></label>
      <textarea id="inputMelody" rows="3">C4 C4 G4 G4 A4 A4 G4 R G4 G4 F4 F4 E4 E4 D4 R C4 C4 G4 G4 A4 A4 G4 R G4 G4 F4 F4 E4 E4 D4 R G4 G4 F4 F4 E4 E4 D4 R G4 G4 F4 F4 E4 E4 D4 R C4 C4 G4 G4 A4 A4 G4 R G4 G4 F4 F4 E4 E4 D4 R</textarea>
      <div class="valid-notes">
        <span class="hint">Valid notes: </span>
        <span id="validNoteList"></span>
      </div>
    </section>

    <section class="section controls-grid">
      <div class="ctrl">
        <label for="orderSlider">Chain order (n)</label>
        <div class="ctrl-row">
          <input type="range" id="orderSlider" min="1" max="4" step="1" value="2" />
          <span class="val" id="orderVal">2</span>
        </div>
        <p class="hint">Higher = more faithful, less creative</p>
      </div>
      <div class="ctrl">
        <label for="lenSlider">Notes to generate</label>
        <div class="ctrl-row">
          <input type="range" id="lenSlider" min="8" max="64" step="4" value="32" />
          <span class="val" id="lenVal">32</span>
        </div>
      </div>
      <div class="ctrl">
        <label for="bpmSlider">Tempo (BPM)</label>
        <div class="ctrl-row">
          <input type="range" id="bpmSlider" min="60" max="200" step="5" value="120" />
          <span class="val" id="bpmVal">120</span>
        </div>
      </div>
      <div class="ctrl">
        <label for="waveSelect">Waveform</label>
        <select id="waveSelect">
          <option value="sine">sine</option>
          <option value="triangle" selected>triangle</option>
          <option value="square">square</option>
          <option value="sawtooth">sawtooth</option>
        </select>
      </div>
    </section>

    <section class="btn-row">
      <button id="learnBtn" class="btn-primary">Learn + Generate</button>
      <button id="playBtn" class="btn-play" disabled>Play</button>
      <button id="stopBtn" class="btn-stop" disabled>Stop</button>
    </section>

    <p class="status" id="status">Enter a melody and click "Learn + Generate"</p>

    <section class="section output-area">
      <div class="note-seq" id="noteSeq">
        <span class="placeholder">Generated notes will appear here</span>
      </div>
    </section>

    <section class="section">
      <div class="matrix-header">
        <label>Transition matrix <span class="hint">(top-10 states shown)</span></label>
        <div class="metrics">
          <div class="metric"><div class="metric-val" id="mStates">—</div><div class="metric-lbl">states</div></div>
          <div class="metric"><div class="metric-val" id="mTrans">—</div><div class="metric-lbl">transitions</div></div>
          <div class="metric"><div class="metric-val" id="mGen">—</div><div class="metric-lbl">generated</div></div>
        </div>
      </div>
      <div id="matrixWrap"><span class="placeholder">Learn a melody to see the transition matrix</span></div>
    </section>

  </main>

  <script>
    "use strict";

    /* ── Note frequency table ── */
    const NOTE_FREQS = {
      C3:130.81, D3:146.83, E3:164.81, F3:174.61, G3:196.00, A3:220.00, B3:246.94,
      C4:261.63, D4:293.66, E4:329.63, F4:349.23, G4:392.00, A4:440.00, B4:493.88,
      C5:523.25, D5:587.33, E5:659.25, F5:698.46, G5:783.99, A5:880.00, B5:987.77,
      R: 0,
    };
    const VALID_NOTES = Object.keys(NOTE_FREQS);

    /* ── Markov logic ── */
    function parseNotes(input) {
      return input.trim().split(/\s+/).filter(n => n in NOTE_FREQS);
    }

    function buildChain(notes, order) {
      if (notes.length < order + 1) return {};
      const chain = {};
      for (let i = 0; i <= notes.length - order - 1; i++) {
        const state = notes.slice(i, i + order).join(",");
        const next  = notes[i + order];
        if (!chain[state]) chain[state] = {};
        chain[state][next] = (chain[state][next] || 0) + 1;
      }
      return chain;
    }

    function weightedRandom(counts) {
      const total = Object.values(counts).reduce((a, b) => a + b, 0);
      let r = Math.random() * total;
      for (const [key, weight] of Object.entries(counts)) {
        r -= weight;
        if (r <= 0) return key;
      }
      return Object.keys(counts)[Object.keys(counts).length - 1];
    }

    function generate(notes, order, length) {
      const chain     = buildChain(notes, order);
      const allStates = Object.keys(chain);
      if (!allStates.length) return [];
      const startIdx = Math.floor(Math.random() * (notes.length - order));
      let state      = notes.slice(startIdx, startIdx + order);
      const result   = [...state];
      for (let i = 0; i < length - order; i++) {
        const key = state.join(",");
        if (!chain[key]) {
          state = allStates[Math.floor(Math.random() * allStates.length)].split(",");
          i--;
          continue;
        }
        const next = weightedRandom(chain[key]);
        result.push(next);
        state = [...state.slice(1), next];
      }
      return result.slice(0, length);
    }

    function countTransitions(chain) {
      return Object.values(chain).reduce((sum, nexts) => sum + Object.keys(nexts).length, 0);
    }

    /* ── Audio engine ── */
    let audioCtx    = null;
    let playTimeout = null;
    let playing     = false;

    function stopPlayback() {
      playing = false;
      if (playTimeout) { clearTimeout(playTimeout); playTimeout = null; }
      if (audioCtx)   { audioCtx.close(); audioCtx = null; }
    }

    function playSequence(notes, bpm, waveform, onNote, onDone) {
      stopPlayback();
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      playing  = true;
      const secPerBeat = 60 / bpm;
      let idx = 0;
      function tick() {
        if (!playing || idx >= notes.length) {
          playing = false;
          if (typeof onDone === "function") onDone();
          return;
        }
        const note = notes[idx];
        const freq = NOTE_FREQS[note];
        if (typeof onNote === "function") onNote(idx, note);
        if (freq > 0 && audioCtx) {
          const now  = audioCtx.currentTime;
          const osc  = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = waveform;
          osc.frequency.setValueAtTime(freq, now);
          gain.gain.setValueAtTime(0, now);
          gain.gain.linearRampToValueAtTime(0.18, now + 0.012);
          gain.gain.exponentialRampToValueAtTime(0.001, now + secPerBeat * 0.85);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now);
          osc.stop(now + secPerBeat * 0.90);
        }
        idx++;
        playTimeout = setTimeout(tick, secPerBeat * 1000);
      }
      tick();
    }

    /* ── UI wiring ── */
    const inputMelody   = document.getElementById("inputMelody");
    const orderSlider   = document.getElementById("orderSlider");
    const lenSlider     = document.getElementById("lenSlider");
    const bpmSlider     = document.getElementById("bpmSlider");
    const waveSelect    = document.getElementById("waveSelect");
    const orderVal      = document.getElementById("orderVal");
    const lenVal        = document.getElementById("lenVal");
    const bpmVal        = document.getElementById("bpmVal");
    const learnBtn      = document.getElementById("learnBtn");
    const playBtn       = document.getElementById("playBtn");
    const stopBtn       = document.getElementById("stopBtn");
    const statusEl      = document.getElementById("status");
    const noteSeqEl     = document.getElementById("noteSeq");
    const matrixWrap    = document.getElementById("matrixWrap");
    const mStates       = document.getElementById("mStates");
    const mTrans        = document.getElementById("mTrans");
    const mGen          = document.getElementById("mGen");
    const validNoteList = document.getElementById("validNoteList");

    let generated = [];

    validNoteList.textContent = VALID_NOTES.join("  ");

    orderSlider.addEventListener("input", () => orderVal.textContent = orderSlider.value);
    lenSlider.addEventListener("input",   () => lenVal.textContent   = lenSlider.value);
    bpmSlider.addEventListener("input",   () => bpmVal.textContent   = bpmSlider.value);

    learnBtn.addEventListener("click", () => {
      const notes  = parseNotes(inputMelody.value);
      const order  = parseInt(orderSlider.value, 10);
      const length = parseInt(lenSlider.value, 10);
      if (notes.length < order + 2) {
        statusEl.textContent = `Need at least ${order + 2} valid notes for an order-${order} chain.`;
        return;
      }
      const chain = buildChain(notes, order);
      generated   = generate(notes, order, length);
      mStates.textContent = Object.keys(chain).length;
      mTrans.textContent  = countTransitions(chain);
      mGen.textContent    = generated.length;
      noteSeqEl.innerHTML = generated.map((n, i) => `<span class="note-pill" id="np${i}">${n}</span>`).join("");
      renderMatrix(chain);
      statusEl.textContent = `Learned order-${order} chain from ${notes.length} notes → generated ${generated.length} notes.`;
      playBtn.disabled = false;
      stopBtn.disabled = true;
    });

    playBtn.addEventListener("click", () => {
      if (!generated.length) return;
      playBtn.disabled = true;
      stopBtn.disabled = false;
      playSequence(
        generated,
        parseInt(bpmSlider.value, 10),
        waveSelect.value,
        (idx, note) => {
          document.querySelectorAll(".note-pill.active").forEach(el => el.classList.remove("active"));
          const pill = document.getElementById("np" + idx);
          if (pill) { pill.classList.add("active"); pill.scrollIntoView({ block: "nearest", inline: "nearest" }); }
          statusEl.textContent = `Playing note ${idx + 1} / ${generated.length}: ${note}`;
        },
        () => {
          document.querySelectorAll(".note-pill.active").forEach(el => el.classList.remove("active"));
          playBtn.disabled = false;
          stopBtn.disabled = true;
          statusEl.textContent = "Playback finished.";
        }
      );
    });

    stopBtn.addEventListener("click", () => {
      stopPlayback();
      document.querySelectorAll(".note-pill.active").forEach(el => el.classList.remove("active"));
      playBtn.disabled = false;
      stopBtn.disabled = true;
      statusEl.textContent = "Stopped.";
    });

    function renderMatrix(chain) {
      const allStates = Object.keys(chain);
      if (!allStates.length) { matrixWrap.innerHTML = "<span class='placeholder'>No transitions found.</span>"; return; }
      const rowTotals = {};
      allStates.forEach(s => { rowTotals[s] = Object.values(chain[s]).reduce((a, b) => a + b, 0); });
      const topStates = [...allStates].sort((a, b) => rowTotals[b] - rowTotals[a]).slice(0, 10);
      const nextNotes = [...new Set(topStates.flatMap(s => Object.keys(chain[s])))].slice(0, 10);
      let html = "<table><thead><tr><th>state →</th>";
      nextNotes.forEach(n => { html += `<th>${n}</th>`; });
      html += "</tr></thead><tbody>";
      topStates.forEach(state => {
        html += `<tr><td class="row-label">${state}</td>`;
        nextNotes.forEach(n => {
          const cnt = chain[state][n] || 0;
          if (!cnt) { html += "<td></td>"; return; }
          const pct = cnt / rowTotals[state];
          html += `<td>${Math.round(pct * 100)}%<span class="cell-bar" style="width:${Math.round(pct * 40)}px"></span></td>`;
        });
        html += "</tr>";
      });
      html += "</tbody></table>";
      matrixWrap.innerHTML = html;
    }
  </script>

</body>
</html>
